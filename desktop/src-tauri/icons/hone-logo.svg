<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!--
    Hone — minimal app icon.
    Bold chiseled "H" on a slate-stone field. No text, no inner mascot:
    those elements only confuse the silhouette at 16/32 px taskbar sizes.
    The strokes are thick (~18% of viewport) so the letter still reads
    clearly when rasterized down to a 16×16 favicon.
  -->
  <defs>
    <!-- Slate stone background: warmer at bottom-left where the "hone strike" lands -->
    <radialGradient id="bg" cx="0.35" cy="0.8" r="1.1">
      <stop offset="0%"  stop-color="#1B1620"/>
      <stop offset="60%" stop-color="#0F1014"/>
      <stop offset="100%" stop-color="#070809"/>
    </radialGradient>

    <!-- Gold gradient for the H: brighter on the chisel-struck face -->
    <linearGradient id="goldFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#F2D082"/>
      <stop offset="45%" stop-color="#D4A853"/>
      <stop offset="100%" stop-color="#9A7332"/>
    </linearGradient>

    <!-- Inner highlight stripe simulating the freshly honed edge -->
    <linearGradient id="honedEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFEFC0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFEFC0" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft inner glow around the H, sells the "polished" look -->
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%"  stop-color="#D4A853" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#D4A853" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle drop shadow under the H letterform -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded-square slate background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Halo behind the letter -->
  <rect width="1024" height="1024" fill="url(#halo)"/>

  <!-- Main "H" — two pillars + crossbar, slightly cut corners (chiseled) -->
  <g filter="url(#softShadow)">
    <!-- Left pillar -->
    <path d="
      M 252 200
      L 392 200
      L 392 470
      L 632 470
      L 632 200
      L 772 200
      L 772 824
      L 632 824
      L 632 554
      L 392 554
      L 392 824
      L 252 824
      Z
    " fill="url(#goldFill)"/>

    <!-- Chiseled highlight: a slim brighter band running along the top edge
         to suggest a freshly polished stone -->
    <path d="
      M 264 212
      L 384 212
      L 384 268
      L 264 268
      Z
      M 644 212
      L 760 212
      L 760 268
      L 644 268
      Z
    " fill="url(#honedEdge)"/>

    <!-- Crossbar gleam — a single horizontal light stroke across the bar -->
    <rect x="404" y="480" width="216" height="18" rx="9" fill="#FFEFC0" opacity="0.45"/>
  </g>

  <!-- Tiny spark accent — top-right corner, says "edge sharpened" -->
  <g opacity="0.9">
    <circle cx="836" cy="190" r="6" fill="#FFEFC0"/>
    <path d="M 836 168 L 836 212 M 814 190 L 858 190" stroke="#FFEFC0" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
