<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1E26"/>
      <stop offset="100%" stop-color="#0C0E12"/>
    </linearGradient>
    <linearGradient id="stone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A853"/>
      <stop offset="40%" stop-color="#E8C97A"/>
      <stop offset="100%" stop-color="#A07830"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <rect width="256" height="256" rx="56" fill="none" stroke="#252A36" stroke-width="2"/>

  <!-- Whetstone geometric block -->
  <g transform="translate(128,138)">
    <!-- Main body -->
    <path d="M-72,-40 L72,-40 L88,48 L-88,48 Z" fill="url(#stone)" opacity="0.95"/>
    <!-- Top surface -->
    <path d="M-72,-40 L72,-40 L76,-32 L-76,-32 Z" fill="#F0D68A" opacity="0.3"/>
    <!-- Left edge -->
    <path d="M-72,-40 L-88,48 L-84,48 L-68,-40 Z" fill="#8B6914" opacity="0.4"/>
    <!-- Right edge -->
    <path d="M72,-40 L88,48 L84,48 L68,-40 Z" fill="#F0D68A" opacity="0.2"/>
    <!-- Bottom edge -->
    <path d="M-88,48 L88,48 L84,54 L-84,54 Z" fill="#6B4F10" opacity="0.4"/>
  </g>

  <!-- Sparks -->
  <g filter="url(#glow)">
    <circle cx="78" cy="82" r="3" fill="#F0D68A" opacity="0.9"/>
    <circle cx="180" cy="92" r="2.5" fill="#F0D68A" opacity="0.7"/>
    <circle cx="144" cy="76" r="2" fill="#F0D68A" opacity="0.8"/>
    <circle cx="100" cy="70" r="1.5" fill="#F0D68A" opacity="0.5"/>
    <circle cx="164" cy="84" r="1.8" fill="#F0D68A" opacity="0.6"/>
  </g>

  <!-- Brand wordmark -->
  <text x="128" y="235" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="#D4A853" letter-spacing="3">HONE</text>
</svg>
