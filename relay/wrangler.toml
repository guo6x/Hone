name = "hone-relay"
main = "worker.js"
compatibility_date = "2025-05-14"

[[durable_objects.bindings]]
name = "RELAY_ROOM"
class_name = "RelayRoom"

[[migrations]]
tag = "v3"
new_sqlite_classes = ["RelayRoom"]

# Each installation owns a random room and gateway credential. The Durable
# Object stores only the credential hash, so a global shared AUTH_TOKEN is not
# used and the old /connect/default room is no longer a supported deployment.

# Routes (optional — can also use workers.dev subdomain)
# [[routes]]
# pattern = "relay.hone.dev/*"
# zone_name = "hone.dev"
